<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Partners — Dracon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

<nav id="navbar"></nav>

<section class="section" style="min-height:70vh;display:flex;align-items:center;justify-content:center;text-align:center">
  <div class="container">
    <div class="section-label fade-in" style="margin:0 auto 20px"><span class="dot"></span>Partners</div>
    <h1 class="fade-in delay-1" style="font-size:clamp(2.4rem,6vw,4rem);font-weight:900;letter-spacing:-0.03em;margin-bottom:16px">Coming soon</h1>
    <p class="fade-in delay-2" style="color:var(--text-muted);max-width:440px;margin:0 auto 32px;font-size:0.95rem;line-height:1.7">We're working on building partnerships with amazing communities and bots. Check back soon.</p>
    <a href="/" class="btn btn-primary fade-in delay-3">Back to home</a>
  </div>
</section>

<footer class="footer">
  <div class="container">
    <div class="footer-inner">
      <div class="footer-bottom" style="border-top:none;padding-top:0">
        <p class="footer-copy">Built with <span style="color:var(--accent)">&hearts;</span> by the Dracon team &mdash; &copy; 2024 Dracon.</p>
        <div style="display:flex;gap:16px;flex-wrap:wrap">
          <a href="/" style="font-size:0.8rem;color:var(--text-subtle);transition:color 0.2s" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--text-subtle)'">Home</a>
          <a href="/privacy.html" style="font-size:0.8rem;color:var(--text-subtle);transition:color 0.2s" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--text-subtle)'">Privacy</a>
          <a href="/terms.html" style="font-size:0.8rem;color:var(--text-subtle);transition:color 0.2s" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--text-subtle)'">Terms</a>
          <a href="/support.html" style="font-size:0.8rem;color:var(--text-subtle);transition:color 0.2s" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--text-subtle)'">Support</a>
        </div>
      </div>
    </div>
  </div>
</footer>

<script src="/script.js"></script>
</body>
</html>
